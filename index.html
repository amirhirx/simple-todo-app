<!DOCTYPE html>
<html lang="fa">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Todo App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

        <h1>تودو اپ</h1>

                <p>می توانید یک کار جدید اضافه کنید</p>
            </div>
        </ul>
    </div>
    <script src="script.js"></script>
</body>
</html>
