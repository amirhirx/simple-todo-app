<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Todo App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>تودو اپ</h1>
        <input class="task-input" type="text" placeholder="کار خود را وارد کنید...">
        <ul class="task-list">
            <li>
                <p>لورم ایپسوم</p>
                <div>
                    <button class="status-btn">انجام شد</button>
                    <button class="remove-btn">حذف</button>
                </div>
            </li>
        </ul>
    </div>
</body>
</html>
